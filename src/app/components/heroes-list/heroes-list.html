<h2>My Heroes</h2>

<div>
  <label for="new-hero">Hero name: </label>
  <input type="text" id="new-hero" #heroName>

  <button
    type="button"
    class="add-button"
    (click)="addHero(heroName.value); heroName.value=''"
  >Add Hero</button>
</div>

@if( heroes ){
  @if(isLoading){
    <h1>Loading heroes...</h1>
  }
  <ul class="heroes">
    @for (hero of heroes; track hero.id){
      <li>
        <a routerLink="/detail/{{hero.id}}">
          <span class="badge">{{hero.id}}</span> {{hero.name}}
        </a>
        <button
          type="button"
          class="delete"
          title="delete hero"
          (click)="deleteHero(hero)"
        >x</button>
      </li>
    }
  </ul>
}
